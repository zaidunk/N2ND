version: 2

updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      - dependency-name: flask
        reason: legacy only, not actively maintained in n2nd
      - dependency-name: pytrends
        reason: legacy only

  - package-ecosystem: npm
    directory: "/dashboard"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 5
    labels:
      - dependencies
